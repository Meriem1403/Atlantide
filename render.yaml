# Blueprint Render — https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → connecter le dépôt GitHub

databases:
  - name: ticketsrepas-db
    plan: free
    databaseName: ticketsrepas
    user: ticketsrepas

services:
  - type: web
    name: ticketsrepas-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm run ensure-admin && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ticketsrepas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: MAIL_ENABLED
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: DATADOC_PATH
        value: ../datadoc
