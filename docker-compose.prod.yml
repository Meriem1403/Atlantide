services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ticketsrepas}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticketsrepas-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ticketsrepas}
      DB_USER: ${DB_USER:-ticketsrepas}
      DB_PASSWORD: ${DB_PASSWORD:-ticketsrepas}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run migrate && npm run seed && npm start"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    container_name: ticketsrepas-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
