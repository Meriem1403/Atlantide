# Déploiement frontend sur Netlify
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Appels API en relatif → même domaine que le site (contourne le blocage proxy vers onrender.com)
  VITE_API_URL = "/api"

# Proxy API : le navigateur ne contacte que atlantide.netlify.app (pas onrender.com)
# Important : cette règle doit rester AVANT la redirection SPA ci-dessous
[[redirects]]
  from = "/api/*"
  to = "https://appticketsrepas.onrender.com/api/:splat"
  status = 200
  force = true

# Application monopage (activation / reset mot de passe par URL)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
