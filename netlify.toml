# Déploiement frontend sur Netlify
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "/api"

# Proxy API — même domaine que le site (obligatoire pour les réseaux avec proxy DSI)
[[redirects]]
  from = "/api/*"
  to = "https://appticketsrepas.onrender.com/api/:splat"
  status = 200
  force = true

# Application monopage
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
